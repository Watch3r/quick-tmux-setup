# ==========================================
# TMUX CONFIGURATION (macOS & Linux)
# ==========================================

# --- Prefix Configuration ---
# Remap prefix from 'C-b' to 'C-space'
unbind C-b
set-option -g prefix C-space
bind-key C-space send-prefix

# --- General Settings ---
# Increase history limit
set -g history-limit 10000

# Stop auto-renaming of windows
set -g allow-rename off

# Use vi keys in copy mode (Prefix + [ to enter)
set-window-option -g mode-keys vi

# Enable mouse mode (Click/drag to resize, click to select)
set -g mouse on

# --- Pane Management (Splits) ---
# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Join/Send panes
bind-key j command-prompt -p "join pane from:" "join-pane -s '%%'"
bind-key s command-prompt -p "send pane to:" "join-pane -t '%%'"

# --- Pane Resizing (Arrow Keys) ---
# The -r flag makes these repeatable (Prefix once, then tap/hold arrows)
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# --- Quality of Life ---
# Quick reload of config file (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Toggle last window (Prefix + Tab)
bind-key Tab last-window

# --- Visuals (Cross-Platform) ---
# Dark grey status bar with white text
set -g status-bg "#333333"
set -g status-fg "#ffffff"

# Highlight the active window in green so you know exactly where you are
set-window-option -g window-status-current-style bg=green,fg=black

# --- Plugins/Extra ---
# Uncomment and update path if you use the logging plugin
# run-shell ~/tmux/path/logging.tmux
